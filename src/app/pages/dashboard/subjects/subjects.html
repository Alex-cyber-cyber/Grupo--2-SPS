<div class="jm-subjects">
  <div class="jm-header">
    <div class="jm-title">
      <h1>Mis Materias</h1>
      <p>Agrega tus materias y administra horarios y contenido.</p>
    </div>

    <div class="jm-header-actions">
      <button
        mat-icon-button
        class="jm-mat-add-btn"
        type="button"
        (click)="openAddModal()"
        aria-label="Agregar materia"
        matTooltip="Agregar materia"
        matTooltipPosition="below">
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </div>

  <div *ngIf="subjects.length === 0" class="jm-empty">
    <div class="jm-empty-box">No tienes materias agregadas</div>
  </div>

  <div class="jm-grid" *ngIf="subjects.length > 0">
    <div
      class="jm-card"
      role="button"
      tabindex="0"
      *ngFor="let subject of subjects"
      [style.borderColor]="subject.color || '#2563EB'"
      (click)="openSubject(subject.id)"
      (keydown.enter)="openSubject(subject.id)"
      (keydown.space)="openSubject(subject.id)">

      <div class="jm-card-top">
        <div class="jm-card-left">
          <div class="jm-card-icon" [style.background]="subject.color || '#2563EB'">
            {{ displayIcon(subject.icon) }}
          </div>

          <div class="jm-card-text">
            <div class="jm-card-name">{{ subject.name }}</div>

            <div class="jm-card-meta">
              {{ subject.module || '' }}
              <span *ngIf="subject.section">• {{ subject.section }}</span>
            </div>
          </div>
        </div>

        <button
          mat-icon-button
          class="jm-card-x jm-mat-card-x"
          type="button"
          (click)="deleteSubject(subject.id); $event.stopPropagation()"
          aria-label="Eliminar"
          matTooltip="Eliminar"
          matTooltipPosition="below">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="jm-card-desc" *ngIf="subject.description">
        {{ subject.description }}
      </div>

      <div class="jm-card-actions" (click)="$event.stopPropagation()">
        <button
          mat-icon-button
          class="jm-mat-action-btn jm-action-view"
          type="button"
          (click)="openInfo(subject, $event)"
          aria-label="Ver info"
          matTooltip="Ver info"
          matTooltipPosition="below">
          <mat-icon>visibility</mat-icon>
        </button>

        <button
          mat-icon-button
          class="jm-mat-action-btn jm-action-folder"
          type="button"
          (click)="openSubject(subject.id)"
          aria-label="Recursos"
          matTooltip="Recursos"
          matTooltipPosition="below">
          <mat-icon>folder</mat-icon>
        </button>

        <button
          mat-icon-button
          class="jm-mat-action-btn jm-action-edit"
          type="button"
          (click)="onEditFromInfo(subject)"
          aria-label="Editar"
          matTooltip="Editar"
          matTooltipPosition="below">
          <mat-icon>edit</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <app-subject-info-modal
    *ngIf="infoSubject"
    [subject]="infoSubject"
    (close)="closeInfo()"
    (editSubject)="onEditFromInfo($event)"
    (deleteSubject)="onDeleteFromInfo($event)">
  </app-subject-info-modal>

  <app-add-subject-modal
    *ngIf="showModal && uid && !selectedSubject"
    [uid]="uid"
    [editData]="editDataForAddModal"
    (close)="onModalClose($event)">
  </app-add-subject-modal>

  <app-edit-subject-modal
    *ngIf="showModal && selectedSubject"
    [subject]="selectedSubject"
    (close)="onModalClose($event)">
  </app-edit-subject-modal>
</div>
