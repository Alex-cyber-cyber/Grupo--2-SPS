<div class="topbar">
  <div class="topbar-left">
    <button class="menu-btn" (click)="toggleSidebar()">&#9776;</button>

    <img src="imagen/Jaguar.png" alt="logo" class="logo" />
    <span class="app-name">Jaguar Mind</span>
  </div>

  <div class="topbar-right">
    <div class="notification-container">
      <button type="button" class="notification" (click)="toggleNotifications()">
        <span class="icon">&#128276;</span>
        <span class="badge">{{ unreadCount }}</span>
      </button>

      <div class="notification-panel" *ngIf="showNotifications">
        <div class="notification-header">
          <h4>Notificaciones</h4>
        </div>

        <div class="notification-empty" *ngIf="notifications.length === 0">
          <p>Tienes 0 notificaciones</p>
        </div>

        <div class="notification-list" *ngIf="notifications.length > 0">
          <div class="notification-item" *ngFor="let item of notifications">
            <div class="notification-item-title">{{ item.title }}</div>
            <div class="notification-item-message">{{ item.message }}</div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="profile"
      routerLink="/dashboard/profile"
      style="cursor: pointer"
      *ngIf="user$ | async as user"
    >
      <img class="avatar" [src]="user.photoURL || '/imagen/Juan Perez.jpg'" alt="Avatar" />
      <span class="username">{{ user.displayName || user.email || 'Usuario' }}</span>
    </div>

    <div class="profile" *ngIf="!(user$ | async)">
      <img src="imagen/Juan Perez.jpg" alt="avatar" class="avatar" />
      <span class="username">Usuario</span>
    </div>
  </div>
</div>
