<div class="topbar">
  <div class="topbar-left">
    <!-- BOTÓN HAMBURGUESA (solo móvil / tablet) -->
    <button class="menu-btn" (click)="toggleSidebar()">☰</button>

    <!-- LOGO (en desktop solo decorativo, en móvil puede abrir también si quieres) -->

    <button class="menu-btn" (click)="toggleSidebar()">&#9776;</button>


    <img src="imagen/Jaguar.png" alt="logo" class="logo" />
    <span class="app-name">Jaguar Mind</span>
  </div>

  <div class="topbar-right">
    <div class="notification">
      <span class="icon">&#128276;</span>
      <span class="badge">3</span>
    </div>
    <div
      class="profile"
      routerLink="/dashboard/profile"
      style="cursor: pointer"
      *ngIf="user$ | async as user"
    >
      <img
        class="avatar"
        [src]="(user$ | async)?.photoURL || '/imagen/Juan Perez.jpg'"
        alt="Avatar"
      />


      <span class="username">
        {{ user.displayName || user.email }}
      </span>
    </div>

    <div class="profile" routerLink="/dashboard/profile" style="cursor: pointer" *ngIf="user$ | async as user">
      <img class="avatar" [src]="user.photoURL || '/imagen/Juan Perez.jpg'" alt="Avatar" />
      <span class="username">{{ user.displayName || user.email || 'Usuario' }}</span>
    </div>

    <div class="profile" *ngIf="!(user$ | async)">
      <img src="imagen/Juan Perez.jpg" alt="avatar" class="avatar" />
      <span class="username">Usuario</span>
    </div>
  </div>
</div>
