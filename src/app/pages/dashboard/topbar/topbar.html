<div class="topbar">
  <div class="topbar-left">

    <!-- BOTÓN HAMBURGUESA (solo móvil / tablet) -->
    <button class="menu-btn" (click)="toggleSidebar()">
      ☰
    </button>

    <!-- LOGO (en desktop solo decorativo, en móvil puede abrir también si quieres) -->
    <img src="imagen/Jaguar.png" alt="logo" class="logo" />
    <span class="app-name">Jaguar Mind</span>
  </div>

  <div class="topbar-right">
    <div class="notification">
      <span class="icon">🔔</span>
      <span class="badge">3</span>
    </div>

    <div class="profile">
      <img src="imagen/Juan Perez.jpg" alt="avatar" class="avatar" />
      <span class="username">
        {{ (authService.user$ | async)?.displayName || 'Usuario' }}
      </span>
    </div>
  </div>
</div>
