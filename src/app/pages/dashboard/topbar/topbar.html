<div class="topbar">
  <div class="topbar-left">
    <img src="imagen/Jaguar.png" alt="logo" class="logo" />
    <span class="app-name">Jaguar Mind</span>
  </div>

  <div class="topbar-right">
    <div class="notification">
      <span class="icon">🔔</span>
      <span class="badge">3</span>
    </div>

   <div
  class="profile"
  routerLink="/dashboard/profile"
  style="cursor: pointer;"
  *ngIf="user$ | async as user"
>

  <img
  class="avatar"
  [src]="(user$ | async)?.photoURL || '/imagen/Juan Perez.jpg'"
  alt="Avatar"
/>


  <span class="username">
    {{ user.displayName || user.email }}
  </span>

</div>



  </div>
</div>
