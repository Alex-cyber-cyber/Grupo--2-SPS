<div class="sidebar">

      <span class="label">Home</span>
    </li>

    <li routerLink="/dashboard/subjects" routerLinkActive="active">
      <span class="icon">📚</span>

      <span class="icon">⭐</span>

      <span class="icon">📝</span>
      <span class="label">Exámenes</span>

      <span class="icon">📖</span>

    </li>

      <span class="icon">📊</span>
