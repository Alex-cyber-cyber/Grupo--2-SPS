<aside class="sidebar" [class.open]="isOpen">
  <ul class="menu">

    <li
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="closeOnMobile()"
    >
      <span class="icon">🏠</span>
      <span class="label">Home</span>
    </li>

    <li
      routerLink="/dashboard/subjects"
      routerLinkActive="active"
      (click)="closeOnMobile()"
    >
      <span class="icon">📚</span>
      <span class="label">Mis Materias</span>
    </li>

    <li
      routerLink="/dashboard/favoritos"
      routerLinkActive="active"
      (click)="closeOnMobile()"
    >
      <span class="icon">⭐</span>
      <span class="label">Favoritos</span>
    </li>

    <li
      routerLink="/dashboard/examenes"
      routerLinkActive="active"
      (click)="closeOnMobile()"
    >
      <span class="icon">📝</span>
      <span class="label">Exámenes</span>
    </li>

    <li
      routerLink="/dashboard/guias"
      routerLinkActive="active"
      (click)="closeOnMobile()"
    >
      <span class="icon">📖</span>
      <span class="label">Guías de Estudio</span>
    </li>

    <li
      routerLink="/dashboard/estadisticas"
      routerLinkActive="active"
      (click)="closeOnMobile()"
    >
      <span class="icon">📊</span>
      <span class="label">Estadísticas</span>
    </li>

    <li class="logout" (click)="logout()">
      <span class="icon">🚪</span>
      <span class="label">Salir</span>
    </li>

  </ul>
</aside>
